name: Financial RAG CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # =========================
  # CI STAGE
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "True"
          DATABASE_URL: "sqlite:///./test_database.db"
          GROQ_API_KEY: "test"
          GEMINI_API_KEY: "test"
          OPENROUTER_API_KEY: "test"
        run: pytest tests.py

  # =========================
  # CD STAGE
  # =========================
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: GROQ_API_KEY,GEMINI_API_KEY,OPENROUTER_API_KEY
          script: |
            set -e
            echo "🚀 Starting deployment..."

            # =========================
            # Install Docker if missing
            # =========================
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker..."
              sudo apt update
              sudo apt install -y ca-certificates curl gnupg

              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt update
              sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # Ensure daemon running
            sudo systemctl start docker || true

            # =========================
            # docker compose fallback
            # =========================
            if ! sudo docker compose version &> /dev/null; then
              echo "Installing docker-compose fallback..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # =========================
            # Clone repo if missing
            # =========================
            if [ ! -d "$HOME/financial-rag-system" ]; then
              git clone https://github.com/pythonmailer/financial-rag-system ~/financial-rag-system
            fi

            cd ~/financial-rag-system
            git fetch --all
            git reset --hard origin/main

            # =========================
            # Write .env
            # =========================
            echo "Writing .env..."
            printf "GROQ_API_KEY=%s\nGEMINI_API_KEY=%s\nOPENROUTER_API_KEY=%s\nDATABASE_URL=postgresql://admin:adminpassword@postgres:5432/financial_rag\nTESTING=False\nUSE_GPU=False\nQDRANT_URL=http://qdrant:6333\nHF_TOKEN=\n" \
            "$GROQ_API_KEY" "$GEMINI_API_KEY" "$OPENROUTER_API_KEY" > .env

            # =========================
            # Stop old containers & clean
            # =========================
            sudo docker compose down || sudo docker-compose down || true
            sudo docker image prune -f || true

            # =========================
            # Start core infra first
            # =========================
            echo "🔄 Starting postgres + qdrant + mlflow..."
            sudo docker compose up -d postgres qdrant mlflow

            # =========================
            # Wait for Qdrant health (Dynamic ID)
            # =========================
            echo "⏳ Waiting for Qdrant..."
            for i in {1..30}; do
              QDRANT_ID=$(sudo docker compose ps -q qdrant)
              if [ -n "$QDRANT_ID" ]; then
                STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' $QDRANT_ID || echo "starting")
                if [ "$STATUS" = "healthy" ]; then
                  echo "✅ Qdrant healthy"
                  break
                fi
              else
                STATUS="starting"
              fi
              
              echo "Qdrant status: $STATUS ($i/30)"
              sleep 5
            done

            QDRANT_ID=$(sudo docker compose ps -q qdrant)
            STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' $QDRANT_ID || echo "unknown")
            if [ "$STATUS" != "healthy" ]; then
              echo "⚠️ Qdrant unhealthy → restarting once..."
              sudo docker restart $QDRANT_ID
              sleep 10
            fi

            # =========================
            # Alembic Migrations (Pre-Boot)
            # =========================
            # Using `run --rm` spins up a temporary backend container just for migrations,
            # preventing the main backend from crashing if the DB isn't fully migrated yet.
            echo "📦 Checking and running migrations..."
            if sudo docker compose run --rm backend alembic current &> /dev/null; then
              sudo docker compose run --rm backend alembic upgrade head || true
            else
              echo "ℹ️ Alembic not configured or failed — skipping"
            fi

            # =========================
            # Start app services
            # =========================
            echo "🔄 Starting backend + ingestor + frontend..."
            sudo docker compose up -d backend ingestor frontend

            # =========================
            # Wait for backend
            # =========================
            echo "⏳ Waiting for backend..."
            for i in {1..30}; do
              if curl -s http://localhost:8001/ready | grep -q '"ready"'; then
                echo "✅ Backend ready!"
                break
              fi
              echo "Backend not ready ($i/30)"
              sleep 5
            done

            echo "🎉 Deployment complete!"