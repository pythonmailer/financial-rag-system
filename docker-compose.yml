services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    environment:
      MLFLOW_HTTP_HOST_VALIDATION_DISABLED: "true"
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5001
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlruns
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  backend:
    build: .
    container_name: backend
    command: sh -c "python database.py && uvicorn main2:app --host 0.0.0.0 --port 8001 --timeout-keep-alive 120"
    ports:
      - "8001:8001"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      DATABASE_URL: postgresql://admin:adminpassword@postgres:5432/financial_rag
      QDRANT_URL: http://qdrant:6333
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_EXPERIMENT_NAME: "Financial_RAG"
      TESTING: "False"
      PYTHONPATH: /app
      USE_GPU: "false"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  frontend:
    build: .
    container_name: frontend
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8001
      PYTHONPATH: /app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ingestor:
    build: .
    container_name: ingestor
    command: python scheduler.py
    volumes:
      - ./sec_data:/app/sec_data
    environment:
      QDRANT_URL: http://qdrant:6333
      BACKEND_URL: http://backend:8001
      DATABASE_URL: postgresql://admin:adminpassword@postgres:5432/financial_rag
      PYTHONPATH: /app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  mlflow_data: